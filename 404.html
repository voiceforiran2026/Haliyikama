<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Gayretli Halı Yıkama</title>
  <script>
    // Redirect all paths to index.html with hash-based navigation
    var path = window.location.pathname;
    var hash = window.location.hash;
    if (path !== '/' && path !== '/index.html') {
      window.location.replace('/#' + path.replace(/^\//, ''));
    } else if (hash) {
      window.location.replace('/' + hash);
    } else {
      window.location.replace('/');
    }
  </script>
</head>
<body></body>
</html>
