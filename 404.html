<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <title>Gayretli Halı Yıkama</title>
  <script>
    var path = window.location.pathname;
    // Known app routes - redirect to root with path preserved via sessionStorage
    if (path === '/gizlilik-politikasi' || path === '/gizlilik-politikasi/') {
      // GitHub Pages SPA fallback: rewrite URL so React sees it
      var newUrl = '/?p=' + encodeURIComponent(path);
      window.location.replace(newUrl);
    } else {
      window.location.replace('/');
    }
  </script>
</head>
<body></body>
</html>
